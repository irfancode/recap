<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Recap</title>
  <style>
    body { width: 320px; margin: 0; padding: 16px; font-family: -apple-system, sans-serif; }
    .container { display: flex; flex-direction: column; gap: 12px; }
    .header { display: flex; align-items: center; gap: 8px; }
    .header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #5558e6; }
    .btn-secondary { background: #f1f5f9; color: #334155; }
    .status { font-size: 13px; color: #64748b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div style="width: 24px; height: 24px; background: #6366f1; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px;">R</div>
      <h1>Recap</h1>
    </div>
    <p class="status" id="status">Save this page to your Recap library</p>
    <div style="display: flex; gap: 8px;">
      <button class="btn btn-primary" id="saveBtn">Save Bookmark</button>
      <button class="btn btn-secondary" id="optionsBtn">Settings</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
